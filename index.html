<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Radar Institucional</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

h1{
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.titulo{
font-weight:bold;
margin-bottom:15px;
font-size:18px;
}

.barra{
background:#1e293b;
height:20px;
border-radius:20px;
overflow:hidden;
margin-bottom:12px;
}

.pro{
background:#22c55e;
height:100%;
text-align:center;
font-size:12px;
}

.contra{
background:#3b82f6;
height:100%;
text-align:center;
font-size:12px;
}

button{
margin-top:10px;
background:#1e293b;
border:none;
color:white;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#334155;
}

.ativos{
display:none;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

.up{color:#22c55e;}
.down{color:#ef4444;}

</style>

</head>

<body>

<h1>📡 RADAR INSTITUCIONAL DE MERCADOS</h1>

<div class="grid">

<div class="card">

<div class="titulo">NASDAQ</div>

A (PRO)
<div class="barra">
<div class="pro" id="barraPro">0%</div>
</div>

B (CONTRA)
<div class="barra">
<div class="contra" id="barraContra">0%</div>
</div>

<button onclick="mostrar()">Mostrar ativos</button>

<div class="ativos" id="ativos">

<div id="nvda"></div>
<div id="aapl"></div>
<div id="msft"></div>
<div id="btc"></div>

<br>

<div id="dxy"></div>
<div id="vix"></div>
<div id="gold"></div>

</div>

</div>

</div>

<script>

function mostrar(){

var el=document.getElementById("ativos")

if(el.style.display=="block")
el.style.display="none"
else
el.style.display="block"

}

function gerar(){

function rnd(){
return (Math.random()*2-1).toFixed(2)
}

let nvda=rnd()
let aapl=rnd()
let msft=rnd()
let btc=rnd()
let dxy=rnd()
let vix=rnd()
let gold=rnd()

function pintar(id,val){

let el=document.getElementById(id)

let classe=val>=0?"up":"down"

el.innerHTML=id.toUpperCase()+" "+(val>0?"+":"")+val+"%"
el.className=classe

}

pintar("nvda",nvda)
pintar("aapl",aapl)
pintar("msft",msft)
pintar("btc",btc)
pintar("dxy",dxy)
pintar("vix",vix)
pintar("gold",gold)

let pro=0
let contra=0

let lista=[nvda,aapl,msft,btc]

lista.forEach(v=>{
if(v>0)pro++
else contra++
})

let total=pro+contra

let p1=Math.round(pro/total*100)
let p2=100-p1

let barraPro=document.getElementById("barraPro")
let barraContra=document.getElementById("barraContra")

barraPro.style.width=p1+"%"
barraPro.innerHTML=p1+"%"

barraContra.style.width=p2+"%"
barraContra.innerHTML=p2+"%"

}

gerar()

setInterval(gerar,15000)

</script>

</body>
</html>
