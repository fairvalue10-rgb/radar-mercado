<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Radar Institucional de Mercados</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
}

h1{
text-align:center;
margin-top:40px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.titulo{
font-weight:bold;
margin-bottom:15px;
font-size:18px;
}

.barra{
background:#1e293b;
height:20px;
border-radius:20px;
overflow:hidden;
margin-bottom:12px;
}

.pro{
background:#22c55e;
height:100%;
text-align:center;
font-size:12px;
}

.contra{
background:#3b82f6;
height:100%;
text-align:center;
font-size:12px;
}

button{
margin-top:10px;
background:#1e293b;
border:none;
color:white;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#334155;
}

.ativos{
display:none;
margin-top:10px;
font-size:14px;
line-height:1.6;
}

.up{color:#22c55e;}
.down{color:#ef4444;}

</style>
</head>

<body>

<h1>📡 RADAR INSTITUCIONAL DE MERCADOS</h1>

<div class="grid">

<!-- NASDAQ -->

<div class="card">

<div class="titulo">NASDAQ</div>

A (PRO)
<div class="barra">
<div class="pro" id="barraProNasdaq">0%</div>
</div>

B (CONTRA)
<div class="barra">
<div class="contra" id="barraContraNasdaq">0%</div>
</div>

<button onclick="mostrarNasdaq()">Mostrar ativos</button>

<div class="ativos" id="ativosNasdaq">

<div id="nvda"></div>
<div id="aapl"></div>
<div id="msft"></div>
<div id="btc"></div>

<br>

<div id="dxy"></div>
<div id="vix"></div>
<div id="gold"></div>

</div>

</div>


<!-- WIN FUTURO -->

<div class="card">

<div class="titulo">WIN FUTURO</div>

A (PRO)
<div class="barra">
<div class="pro" id="barraProWin">0%</div>
</div>

B (CONTRA)
<div class="barra">
<div class="contra" id="barraContraWin">0%</div>
</div>

<button onclick="mostrarWin()">Mostrar ativos</button>

<div class="ativos" id="ativosWin">

<div id="vale"></div>
<div id="petr"></div>
<div id="itub"></div>
<div id="bbdc"></div>

<br>

<div id="dolar"></div>
<div id="vixbr"></div>
<div id="us10y"></div>

</div>

</div>

</div>

<script>

function rnd(){
return (Math.random()*2-1).toFixed(2)
}

function pintar(id,nome,val){

let el=document.getElementById(id)

let classe=val>=0?"up":"down"

el.innerHTML=nome+" "+(val>0?"+":"")+val+"%"
el.className=classe

}

function gerarNasdaq(){

let nvda=rnd()
let aapl=rnd()
let msft=rnd()
let btc=rnd()

let dxy=rnd()
let vix=rnd()
let gold=rnd()

pintar("nvda","NVDA",nvda)
pintar("aapl","AAPL",aapl)
pintar("msft","MSFT",msft)
pintar("btc","BTC",btc)

pintar("dxy","DXY",dxy)
pintar("vix","VIX",vix)
pintar("gold","GOLD",gold)

let lista=[nvda,aapl,msft,btc]

let pro=0
let contra=0

lista.forEach(v=>{
if(v>0)pro++
else contra++
})

let total=pro+contra

let p1=Math.round(pro/total*100)
let p2=100-p1

let barraPro=document.getElementById("barraProNasdaq")
let barraContra=document.getElementById("barraContraNasdaq")

barraPro.style.width=p1+"%"
barraPro.innerHTML=p1+"%"

barraContra.style.width=p2+"%"
barraContra.innerHTML=p2+"%"

}

function gerarWin(){

let vale=rnd()
let petr=rnd()
let itub=rnd()
let bbdc=rnd()

let dolar=rnd()
let vix=rnd()
let us10y=rnd()

pintar("vale","VALE3",vale)
pintar("petr","PETR4",petr)
pintar("itub","ITUB4",itub)
pintar("bbdc","BBDC4",bbdc)

pintar("dolar","USD/BRL",dolar)
pintar("vixbr","VIX",vix)
pintar("us10y","US10Y",us10y)

let lista=[vale,petr,itub,bbdc]

let pro=0
let contra=0

lista.forEach(v=>{
if(v>0)pro++
else contra++
})

let total=pro+contra

let p1=Math.round(pro/total*100)
let p2=100-p1

let barraPro=document.getElementById("barraProWin")
let barraContra=document.getElementById("barraContraWin")

barraPro.style.width=p1+"%"
barraPro.innerHTML=p1+"%"

barraContra.style.width=p2+"%"
barraContra.innerHTML=p2+"%"

}

function atualizarRadar(){

gerarNasdaq()
gerarWin()

}

function mostrarNasdaq(){

let el=document.getElementById("ativosNasdaq")

el.style.display = el.style.display=="block" ? "none":"block"

}

function mostrarWin(){

let el=document.getElementById("ativosWin")

el.style.display = el.style.display=="block" ? "none":"block"

}

atualizarRadar()

setInterval(atualizarRadar,15000)

</script>

</body>
</html>
